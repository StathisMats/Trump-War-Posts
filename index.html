<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trump Tracker</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal-container">
        <header class="status-bar">
            <div class="status-left">
                <span class="live-indicator"></span>
                <span class="system-title">US PRES DESK // TERMINAL V1.0</span>
            </div>
            <div class="status-right">
                <span id="system-clock">--:--:--</span>
                <span class="connection-status">CONNECTED</span>
            </div>
        </header>

        <div class="feed-header">
            <div class="col-time">DATE (GMT)</div>
            <div class="col-elapsed">ELAPSED</div>
            <div class="col-source">SOURCE</div>
            <div class="col-text">STATEMENT</div>
        </div>

        <main id="feed-body" class="feed-body">
            <div class="loading">AWAITING DATALINK...</div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
