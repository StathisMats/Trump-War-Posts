<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POTUS SQUAWK // TRUTH FEED</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal-container">
        <header class="status-bar">
            <div class="status-left">
                <img src="logo.png" alt="Squawk Logo" class="logo">
                <span class="live-indicator"></span>
                <span class="system-title">POTUS DESK // TERMINAL V1.1</span>
            </div>
            <div class="status-right">
                <span id="system-clock">--:--:--</span>
                <span class="connection-status">CONNECTED</span>
            </div>
        </header>

        <div class="feed-header">
            <div class="col-date">DATE (GMT)</div>
            <div class="col-source">SOURCE</div>
            <div class="col-text">STATEMENT</div>
        </div>

        <main id="feed-body" class="feed-body">
            <div class="loading">AWAITING DATALINK...</div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
